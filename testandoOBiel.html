<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Pergunta importante</title>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      margin-top: 100px;
    }

    h1 {
      font-size: 32px;
    }

    .btn {
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
      margin: 20px;
    }

    #nao {
      position: absolute;
    }
  </style>
</head>
<body>

  <h1 id="pergunta">Você é gay?</h1>

  <button class="btn" onclick="clicarSim()">Sim</button>
  <button class="btn" id="nao">Não</button>

  <script>
    function clicarSim() {
      document.getElementById("pergunta").innerText = "Eu sabia 😏";
    }

    const botaoNao = document.getElementById("nao");

    botaoNao.addEventListener("mouseover", () => {
      const largura = window.innerWidth - botaoNao.offsetWidth;
      const altura = window.innerHeight - botaoNao.offsetHeight;

      const x = Math.random() * largura;
      const y = Math.random() * altura;

      botaoNao.style.left = x + "px";
      botaoNao.style.top = y + "px";
    });
  </script>

</body>
</html>
